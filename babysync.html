    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {

      background-color: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* Language Switcher */
    .lang-switcher {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 100;
    }

    .lang-switcher select {
      appearance: none;
      -webkit-appearance: none;
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 36px 8px 14px;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;

      background-repeat: no-repeat;
      background-position: right 12px center;
    }

    .lang-switcher select:hover,
    .lang-switcher select:focus {
      border-color: var(--primary);
    }

    /* Hero */

      padding: 80px 24px 60px;

      background: radial-gradient(ellipse at 50% 0%, rgba(124,106,239,0.15) 0%, transparent 60%);
    }

    .hero-icon {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(124,106,239,0.3);
    }

    .hero .subtitle { font-size: 1.3rem; color: var(--text-secondary); font-weight: 400; margin-bottom: 24px; }
    .hero .tagline { font-size: 1.1rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto 36px; line-height: 1.8; }

    .cta-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 14px; font-size: 1rem; font-weight: 600;
      text-decoration: none; transition: all 0.25s ease;
    }
    .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 16px rgba(124,106,239,0.35); }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(124,106,239,0.45); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--primary); background: rgba(124,106,239,0.08); transform: translateY(-2px); }

    /* Features */
    .features { padding: 60px 24px; }
    .features h2 { text-align: center; font-size: 2rem; font-weight: 600; margin-bottom: 48px; }
    .features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }

    .feature-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      padding: 28px; transition: all 0.25s ease;
    }
    .feature-card:hover { border-color: rgba(124,106,239,0.3); transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .feature-icon { font-size: 2.2rem; margin-bottom: 12px; display: block; }
    .feature-card h3 { font-size: 1.15rem; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .feature-card p { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.7; }

    /* How */
    .how { padding: 60px 24px; }
    .how h2 { text-align: center; font-size: 2rem; font-weight: 600; margin-bottom: 48px; }
    .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
    .step { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; text-align: center; }
    .step-num { width: 44px; height: 44px; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; background: rgba(124,106,239,0.15); color: var(--primary); font-weight: 700; font-size: 1.1rem; margin-bottom: 16px; }
    .step h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
    .step p { color: var(--text-secondary); font-size: 0.95rem; }

    /* CTA */
    .cta { padding: 80px 24px; text-align: center; background: radial-gradient(ellipse at 50% 100%, rgba(124,106,239,0.12) 0%, transparent 60%); }
    .cta h2 { font-size: 2rem; font-weight: 600; margin-bottom: 12px; }
    .cta p { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 32px; max-width: 500px; margin-left: auto; margin-right: auto; }
    .lang-note { margin-top: 24px; font-size: 0.9rem; color: var(--text-secondary); }

    /* Footer */
    footer { border-top: 1px solid var(--border); padding: 32px 24px; text-align: center; color: var(--text-secondary); font-size: 0.85rem; }
    footer a { color: var(--text-secondary); text-decoration: none; margin: 0 12px; transition: color 0.2s; }
    footer a:hover { color: var(--text); }
    footer .links { margin-top: 12px; }

    @media (max-width: 768px) {
      .hero h1 { font-size: 2.2rem; }
      .hero .subtitle { font-size: 1.1rem; }
      .features-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .hero { padding: 60px 20px 40px; }

      .hero-icon { width: 96px; height: 96px; border-radius: 22px; }
      .features, .how, .cta { padding: 40px 16px; }
      .feature-card, .step { padding: 22px; }
      .cta-row { flex-direction: column; align-items: center; }
      .btn { width: 100%; max-width: 280px; justify-content: center; }
    }
  </style>
</head>

    function setLang(lang) {
      document.documentElement.lang = lang === "zh-Hans" ? "zh-CN" : lang === "zh-Hant" ? "zh-TW" : lang;
      const strings = i18n[lang] || i18n.en;
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (strings[key] != null) el.innerHTML = strings[key];
      });
      localStorage.setItem("babysync-lang", lang);
      document.getElementById("langSelect").value = lang;
    }

    document.getElementById("langSelect").addEventListener("change", e => setLang(e.target.value));

    // Auto-detect or restore saved language
    const saved = localStorage.getItem("babysync-lang");
    if (saved && i18n[saved]) {
      setLang(saved);
    } else {
      const browserLang = navigator.language || "";
      if (browserLang.startsWith("ja")) setLang("ja");
      else if (browserLang.startsWith("vi")) setLang("vi");
      else if (browserLang === "zh-TW" || browserLang === "zh-Hant") setLang("zh-Hant");
      else if (browserLang.startsWith("zh")) setLang("zh-Hans");
      else setLang("en");
    }
  </script>
