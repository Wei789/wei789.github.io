<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline'; connect-src https:; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iOS App Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
          integrity="sha512-XMVd28F1oH/O71fzwBnV7HucLxVwtxf26XV8P4wPk26EDxuGZ91N8bsOttmnomcCD3CS5ZMRL50H0GgOHvegtg=="
          crossorigin="anonymous" defer></script>
  <style>
    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --primary: #0071e3;
      --primary-hover: #0077ED;
      --text: #1d1d1f;
      --text2: #6e6e73;
      --border: #d2d2d7;
      --danger: #ff3b30;
      --success: #34c759;
      --warning: #ff9500;
      --code-bg: #1e1e1e;
      --code-text: #d4d4d4;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    header {
      text-align: center;
      padding: 40px 0 32px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span {
      background: linear-gradient(135deg, var(--primary), #6c5ce7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--text2);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card h2 .icon {
      font-size: 1.2rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-family: inherit;
      background: var(--bg);
      transition: border-color .2s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.12);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .stage-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stage-item {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
    }

    .stage-item.dragging {
      opacity: 0.5;
    }

    .stage-item.drag-over {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.12);
    }

    .stage-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .drag-handle {
      cursor: grab;
      color: var(--text2);
      font-size: 1.2rem;
      user-select: none;
      flex-shrink: 0;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .stage-name {
      font-weight: 600;
      font-size: 0.95rem;
      flex: 1;
    }

    .stage-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      background: #e8f0fe;
      color: var(--primary);
      white-space: nowrap;
    }

    .stage-badge.custom {
      background: #fff3e0;
      color: var(--warning);
    }

    .stage-actions {
      display: flex;
      gap: 4px;
    }

    .stage-actions button {
      border: none;
      background: none;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 0.85rem;
      color: var(--text2);
      transition: background .15s;
    }

    .stage-actions button:hover {
      background: var(--border);
    }

    .stage-actions button.delete-btn:hover {
      background: #ffe5e5;
      color: var(--danger);
    }

    .stage-body {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding-left: 30px;
    }

    .stage-body label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text2);
    }

    .stage-body select {
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.85rem;
      background: white;
      min-width: 220px;
    }

    .stage-body select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .stage-desc {
      font-size: 0.82rem;
      color: var(--text2);
      padding-left: 30px;
    }

    .stage-desc-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.85rem;
      font-family: inherit;
      resize: vertical;
      min-height: 48px;
    }

    .stage-desc-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .add-stage-bar {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .add-stage-bar input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.9rem;
      background: white;
    }

    .add-stage-bar input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color .2s, transform .2s, border-color .2s, color .2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: var(--border);
      color: var(--text2);
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1.5px solid var(--border);
    }

    .btn-secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .btn-danger {
      background: #ffe5e5;
      color: var(--danger);
    }

    .btn-danger:hover {
      background: #ffd0d0;
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 0.82rem;
    }

    .btn-block {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 1rem;
    }

    .generate-section {
      text-align: center;
      margin: 24px 0;
    }

    .progress-section {
      display: none;
    }

    .progress-section.active {
      display: block;
    }

    .stage-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .stage-progress:last-child {
      border-bottom: none;
    }

    .stage-progress .status-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .stage-progress .stage-label {
      flex: 1;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .stage-progress .stage-time {
      font-size: 0.8rem;
      color: var(--text2);
    }

    .stage-progress .retry-btn {
      padding: 4px 10px;
      font-size: 0.75rem;
      margin-left: 8px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .output-area {
      background: var(--code-bg);
      color: var(--code-text);
      border-radius: 10px;
      padding: 16px;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 0.8rem;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.6;
      margin-top: 12px;
    }

    .output-area .stage-marker {
      color: var(--primary);
      font-weight: 700;
    }

    .output-area .file-marker {
      color: var(--success);
      font-weight: 600;
    }

    .output-area .error-text {
      color: var(--danger);
    }

    .file-tree {
      margin-top: 12px;
    }

    .file-tree-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      font-size: 0.85rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .file-tree-item:hover {
      background: var(--bg);
    }

    .file-tree-item .ft-icon {
      font-size: 0.9rem;
    }

    .file-tree-item .ft-name {
      flex: 1;
    }

    .file-tree-item .ft-size {
      font-size: 0.75rem;
      color: var(--text2);
    }

    .download-section {
      display: none;
      text-align: center;
      padding: 24px;
    }

    .download-section.active {
      display: block;
    }

    .download-section .file-count {
      font-size: 0.9rem;
      color: var(--text2);
      margin-bottom: 12px;
    }

    .settings-toggle {
      font-size: 0.85rem;
      color: var(--primary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 12px;
    }

    .settings-toggle:hover {
      text-decoration: underline;
    }

    .settings-content {
      display: none;
    }

    .settings-content.open {
      display: block;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      width: 90%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }

    .modal h3 {
      margin-bottom: 16px;
    }

    .modal .form-group {
      margin-bottom: 12px;
    }

    .modal .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .insert-select {
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.85rem;
      width: 100%;
    }

    .checkbox-row,
    .checkbox-col {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .checkbox-col {
      flex-direction: column;
      gap: 6px;
    }

    .checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.88rem;
      cursor: pointer;
      padding: 4px 0;
      user-select: none;
    }

    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    @media (max-width:640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>&#xF8FF; <span>iOS App Generator</span></h1>
      <p>輸入 App 資訊，AI 自動產生完整 Xcode 專案</p>
    </header>

    <!-- Settings -->
    <div class="card">
      <div class="settings-toggle" onclick="toggleSettings()">&#9881; 進階設定 <span id="settingsArrow">&#9654;</span></div>
      <div class="settings-content" id="settingsContent">
        <div class="form-grid">
          <div class="form-group">
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="請輸入 API Key">
          </div>
          <div class="form-group">
            <label>API Base URL</label>
            <input type="text" id="apiBase" value="https://api.mixroute.ai/v1">
          </div>
          <div class="form-group">
            <label>Temperature (0-1)</label>
            <input type="number" id="temperature" value="0.4" min="0" max="1" step="0.1">
          </div>
          <div class="form-group">
            <label>Max Tokens / Stage</label>
            <input type="number" id="maxTokens" value="16384" min="1024" max="65536" step="1024">
          </div>
        </div>
      </div>
    </div>

    <!-- App Configuration -->
    <div class="card">
      <h2><span class="icon">&#128241;</span> App 設定</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>App 名稱（顯示名稱）</label>
          <input type="text" id="appName" placeholder="我的 App" oninput="updateModuleName()">
        </div>
        <div class="form-group">
          <label>Swift 模組名稱（英文，用於程式碼）</label>
          <input type="text" id="moduleName" placeholder="MyAwesomeApp" oninput="validateModuleName()">
          <div id="moduleNameHint" style="font-size:0.75rem;color:var(--text2);"></div>
        </div>
        <div class="form-group">
          <label>Bundle ID</label>
          <input type="text" id="bundleId" placeholder="com.example.myapp">
        </div>
        <div class="form-group">
          <label>最低 iOS 版本</label>
          <select id="minIOS">
            <option value="11.0">iOS 11.0</option>
            <option value="12.0">iOS 12.0</option>
            <option value="13.0">iOS 13.0</option>
            <option value="14.0">iOS 14.0</option>
            <option value="15.0">iOS 15.0</option>
            <option value="16.0" selected>iOS 16.0</option>
            <option value="17.0">iOS 17.0</option>
            <option value="18.0">iOS 18.0</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Supported Destinations</label>
          <div class="checkbox-row" id="destinationsRow">
            <label class="checkbox-label"><input type="checkbox" value="iphone" checked> iPhone</label>
            <label class="checkbox-label"><input type="checkbox" value="ipad"> iPad</label>
            <label class="checkbox-label"><input type="checkbox" value="mac-catalyst"> Mac (Catalyst)</label>
            <label class="checkbox-label"><input type="checkbox" value="vision"> Apple Vision</label>
          </div>
        </div>
        <div class="form-group">
          <label>iPhone Orientation</label>
          <div class="checkbox-col" id="iphoneOrientations">
            <label class="checkbox-label"><input type="checkbox" value="UIInterfaceOrientationPortrait" checked>
              Portrait</label>
            <label class="checkbox-label"><input type="checkbox" value="UIInterfaceOrientationLandscapeLeft"> Landscape
              Left</label>
            <label class="checkbox-label"><input type="checkbox" value="UIInterfaceOrientationLandscapeRight"> Landscape
              Right</label>
            <label class="checkbox-label"><input type="checkbox" value="UIInterfaceOrientationPortraitUpsideDown">
              Upside Down</label>
          </div>
        </div>
        <div class="form-group">
          <label>iPad Orientation</label>
          <div class="checkbox-col" id="ipadOrientations">
            <label class="checkbox-label"><input type="checkbox" value="UIInterfaceOrientationPortrait">
              Portrait</label>
            <label class="checkbox-label"><input type="checkbox" value="UIInterfaceOrientationLandscapeLeft">
              Landscape Left</label>
            <label class="checkbox-label"><input type="checkbox" value="UIInterfaceOrientationLandscapeRight">
              Landscape Right</label>
            <label class="checkbox-label"><input type="checkbox" value="UIInterfaceOrientationPortraitUpsideDown">
              Upside Down</label>
          </div>
        </div>
        <div class="form-group full">
          <label>核心功能描述</label>
          <textarea id="appFeatures" placeholder="描述你的 App 核心功能，例如：一個待辦事項管理 App，支援分類、提醒、iCloud 同步..."></textarea>
        </div>
      </div>
    </div>

    <!-- Development Stages -->
    <div class="card">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap;">
        <h2 style="margin-bottom:0;flex:1;"><span class="icon">&#128736;</span> 開發階段</h2>
        <button class="btn btn-secondary btn-sm" onclick="exportStages()" style="font-size:0.78rem;" title="匯出階段設定為 JSON 檔案">&#128229; 匯出</button>
        <button class="btn btn-secondary btn-sm" onclick="document.getElementById('stageImportInput').click()" style="font-size:0.78rem;" title="從 JSON 檔案匯入階段設定">&#128228; 匯入</button>
        <button class="btn btn-secondary btn-sm" onclick="resetStages()" style="font-size:0.78rem;">↺ 重置為預設</button>
        <input type="file" id="stageImportInput" accept="application/json,.json" style="display:none;" onchange="importStages(event)">
      </div>
      <div class="stage-list" id="stageList"></div>
      <div class="add-stage-bar">
        <input type="text" id="newStageName" placeholder="輸入自定義階段名稱...">
        <button class="btn btn-secondary btn-sm" onclick="openAddStageModal()">+ 新增階段</button>
      </div>
    </div>

    <!-- Generate -->
    <div class="generate-section">
      <button class="btn btn-primary btn-block" id="generateBtn" onclick="startGeneration()">&#127881; 開始產生 iOS
        App</button>
      <button class="btn btn-danger btn-block" id="stopBtn" style="display:none" onclick="stopGeneration()">&#9632;
        停止產生</button>
    </div>

    <!-- Progress -->
    <div class="card progress-section" id="progressSection">
      <h2><span class="icon">&#9881;</span> 產生進度</h2>
      <div id="progressList"></div>
      <div class="output-area" id="outputArea"></div>
    </div>

    <!-- File Preview -->
    <div class="card progress-section" id="filePreviewSection">
      <h2><span class="icon">&#128193;</span> 產生的檔案</h2>
      <div class="file-tree" id="fileTree"></div>
    </div>

    <!-- Download -->
    <div class="card download-section" id="downloadSection">
      <h2>&#127881; App 專案產生完成！</h2>
      <div class="file-count" id="fileCount"></div>
      <button class="btn btn-primary btn-block" onclick="downloadProject()">&#128230; 下載 Xcode 專案 (.zip)</button>
    </div>
  </div>

  <!-- Add Stage Modal -->
  <div class="modal-overlay" id="addStageModal">
    <div class="modal">
      <h3>新增自定義開發階段</h3>
      <div class="form-group">
        <label>階段名稱</label>
        <input type="text" id="modalStageName" placeholder="例如：單元測試撰寫">
      </div>
      <div class="form-group">
        <label>階段描述 / AI 指令</label>
        <textarea class="stage-desc-input" id="modalStageDesc" placeholder="描述這個階段要做什麼，AI 會根據此描述產生對應的程式碼..."></textarea>
      </div>
      <div class="form-group">
        <label>插入位置</label>
        <select class="insert-select" id="modalInsertPos"></select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary btn-sm" onclick="closeAddStageModal()">取消</button>
        <button class="btn btn-primary btn-sm" onclick="confirmAddStage()">新增</button>
      </div>
    </div>
  </div>

  <!-- File Preview Modal -->
  <div class="modal-overlay" id="fileModal">
    <div class="modal" style="max-width:720px;max-height:80vh;display:flex;flex-direction:column;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 id="fileModalTitle" style="font-size:0.95rem;"></h3>
        <button class="btn btn-secondary btn-sm" onclick="closeFileModal()">&#10005;</button>
      </div>
      <div class="output-area" id="fileModalContent" style="flex:1;max-height:60vh;"></div>
    </div>
  </div>

  <script>
    // ===== STATE =====
    const MODELS = [
      { id: 'claude-opus-4-6', name: 'Claude Opus 4.6', group: 'Anthropic' },
      { id: 'claude-opus-4-5-20251101', name: 'Claude Opus 4.5', group: 'Anthropic' },
      { id: 'claude-opus-4-1-20250805', name: 'Claude Opus 4.1', group: 'Anthropic' },
      { id: 'claude-sonnet-4-5-20250929', name: 'Claude Sonnet 4.5', group: 'Anthropic' },
      { id: 'claude-haiku-4-5-20251001', name: 'Claude Haiku 4.5', group: 'Anthropic' },
      { id: 'gpt-5.2', name: 'GPT-5.2', group: 'OpenAI' },
      { id: 'gpt-5.1', name: 'GPT-5.1', group: 'OpenAI' },
      { id: 'gpt-5.1-chat', name: 'GPT-5.1 Chat', group: 'OpenAI' },

      const moduleInput = document.getElementById('moduleName').value.trim();

      const appName = document.getElementById('appName').value.trim();
      let name = appName.replace(/[^a-zA-Z0-9_]/g, '');
      if (!name) {
        const bundleId = document.getElementById('bundleId').value.trim();
        if (bundleId) {
          const parts = bundleId.split('.');
          name = parts[parts.length - 1].replace(/[^a-zA-Z0-9_]/g, '');
        }
      }
      if (!name) name = 'MyApp';
      if (/^[0-9]/.test(name)) name = 'App' + name;
      return name;
    }

  TextField("Search", text: $query)
  List(items.filter { ... }) { ... }
}

// ❌ WRONG — .task requires iOS 15+:
ContentView().task { await load() }

// ✅ CORRECT for iOS ${v}:
ContentView().onAppear { Task { await load() } }  // iOS 15+ async/await works
// For iOS 13: use Combine or completion handlers
`;
      }

      if (v < 14) {
        ex += `
// ❌ WRONG — @StateObject requires iOS 14+:
struct ContentView: View {
  @StateObject private var vm = ViewModel()
}

// ✅ CORRECT for iOS ${v}:
struct ContentView: View {
  @ObservedObject var vm: ViewModel  // instantiate in parent, pass down
}
`;
      }

      return ex;
    }

    // ===== UTILITIES =====
    function escapeHTML(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    // ===== LOCAL STORAGE PERSISTENCE =====
    const STORAGE_KEY_STAGES = 'ios-app-gen-stages';
    const STORAGE_KEY_SETTINGS = 'ios-app-gen-settings';
    const STORAGE_KEY_APIKEY = 'ios-app-gen-apikey';
    const sharedTextEncoder = new TextEncoder();

    function saveStages() {
      try {
        const data = stages.map(s => ({
          id: s.id, name: s.name, model: s.model,
          builtin: s.builtin, description: s.description, prompt: s.prompt,
        }));
        localStorage.setItem(STORAGE_KEY_STAGES, JSON.stringify(data));
      } catch (e) { console.warn('Failed to save stages:', e); }
    }

    function loadStages() {
      try {
        const data = localStorage.getItem(STORAGE_KEY_STAGES);
        if (data) {
          const parsed = JSON.parse(data);
          if (Array.isArray(parsed) && parsed.length > 0) return parsed;
        }
      } catch (e) { console.warn('Failed to load stages:', e); }
      return null;
    }

    function resetStages() {
      if (!confirm('確定要重置為預設階段嗎？自定義的階段將會被刪除。')) return;
      stages = DEFAULT_STAGES.map(s => ({ ...s }));
      localStorage.removeItem(STORAGE_KEY_STAGES);
      renderStages();
    }

    function exportStages() {
      try {
        const data = stages.map(s => ({
          id: s.id, name: s.name, model: s.model,
          builtin: s.builtin, description: s.description, prompt: s.prompt,
        }));
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
        a.download = `ios-app-gen-stages-${ts}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('匯出失敗: ' + e.message);
        console.error(e);
      }
    }

    function importStages(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!Array.isArray(parsed) || parsed.length === 0) {
            alert('無效的階段檔案：內容必須為非空的 JSON 陣列');
            return;
          }
          for (const s of parsed) {
            if (!s || typeof s !== 'object' || !s.name) {
              alert('無效的階段檔案：每個階段必須至少包含 name 欄位');
              return;
            }
          }
          if (!confirm(`將匯入 ${parsed.length} 個階段並覆蓋目前的設定，確定要繼續嗎？`)) return;
          stages = parsed.map(s => ({
            id: s.id || ('custom-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7)),
            name: String(s.name),
            model: s.model || 'claude-sonnet-4-5-20250929',
            builtin: !!s.builtin,
            description: s.description || s.name,
            prompt: s.prompt || '',
          }));
          renderStages();
          saveStages();
          alert(`成功匯入 ${stages.length} 個階段`);
        } catch (err) {
          alert('匯入失敗: ' + err.message);
          console.error(err);
        } finally {
          e.target.value = '';
        }
      };
      reader.onerror = () => {
        alert('讀取檔案失敗');
        e.target.value = '';
      };
      reader.readAsText(file);
    }

    function saveSettings() {
      try {
        // API Key uses sessionStorage (cleared when browser closes) for security
        sessionStorage.setItem(STORAGE_KEY_APIKEY, document.getElementById('apiKey').value);

        const settings = {
          apiBase: document.getElementById('apiBase').value,
          temperature: document.getElementById('temperature').value,
          maxTokens: document.getElementById('maxTokens').value,
          appName: document.getElementById('appName').value,
          moduleName: document.getElementById('moduleName').value,
          moduleNameUserEdited: document.getElementById('moduleName').dataset.userEdited || '',
          bundleId: document.getElementById('bundleId').value,
          minIOS: document.getElementById('minIOS').value,

          destinations: getSelectedDestinations(),
          iphoneOrientations: getSelectedOrientations('iphoneOrientations'),
          ipadOrientations: getSelectedOrientations('ipadOrientations'),
        };
        localStorage.setItem(STORAGE_KEY_SETTINGS, JSON.stringify(settings));
      } catch (e) { console.warn('Failed to save settings:', e); }
    }

    // Debounced version to avoid excessive writes on every keystroke
    let _saveTimer;
    function debouncedSaveSettings() {
      clearTimeout(_saveTimer);
      _saveTimer = setTimeout(saveSettings, 500);
    }

    function loadSettings() {
      try {
        // Restore API Key from sessionStorage
        const savedKey = sessionStorage.getItem(STORAGE_KEY_APIKEY);
        if (savedKey) document.getElementById('apiKey').value = savedKey;

        const data = localStorage.getItem(STORAGE_KEY_SETTINGS);
        if (!data) return;
        const s = JSON.parse(data);
        if (s.apiBase !== undefined) document.getElementById('apiBase').value = s.apiBase;
        if (s.temperature !== undefined) document.getElementById('temperature').value = s.temperature;
        if (s.maxTokens !== undefined) document.getElementById('maxTokens').value = s.maxTokens;
        if (s.appName) document.getElementById('appName').value = s.appName;
        if (s.moduleName) {
          document.getElementById('moduleName').value = s.moduleName;
          if (s.moduleNameUserEdited) document.getElementById('moduleName').dataset.userEdited = 'true';
        }
        if (s.bundleId) document.getElementById('bundleId').value = s.bundleId;
        if (s.minIOS) document.getElementById('minIOS').value = s.minIOS;
        if (s.appFeatures) document.getElementById('appFeatures').value = s.appFeatures;
        if (s.destinations) {
          document.querySelectorAll('#destinationsRow input').forEach(cb => {
            cb.checked = s.destinations.includes(cb.value);
          });
        }
        if (s.iphoneOrientations) {
          document.querySelectorAll('#iphoneOrientations input').forEach(cb => {
            cb.checked = s.iphoneOrientations.includes(cb.value);
          });
        }
        if (s.ipadOrientations) {
          document.querySelectorAll('#ipadOrientations input').forEach(cb => {
            cb.checked = s.ipadOrientations.includes(cb.value);
          });
        }
      } catch (e) { console.warn('Failed to load settings:', e); }
    }

    // ===== INITIALIZATION =====
    function init() {
      const savedStages = loadStages();
      stages = savedStages || DEFAULT_STAGES.map(s => ({ ...s }));
      renderStages();
      loadSettings();
      updateModuleNameHint();

      // Auto-save form settings on any change (debounced for text input)
      document.querySelectorAll('.card input, .card textarea, .card select').forEach(el => {
        el.addEventListener('change', saveSettings);
        if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
          el.addEventListener('input', debouncedSaveSettings);
        }
      });

      // iPad destination 取消時，自動取消所有 iPad Orientation
      const ipadDestCb = document.querySelector('#destinationsRow input[value="ipad"]');
      if (ipadDestCb) {
        ipadDestCb.addEventListener('change', function () {
          if (!this.checked) {
            document.querySelectorAll('#ipadOrientations input').forEach(cb => cb.checked = false);
            saveSettings();
          }
        });
      }
    }

    // ===== MODEL SELECT HTML =====
    function modelSelectHTML(selectedId, stageId) {
      const groups = {};
      MODELS.forEach(m => { (groups[m.group] = groups[m.group] || []).push(m); });
      let html = `<select onchange="updateStageModel('${escapeHTML(stageId)}', this.value)">`;
      for (const [group, models] of Object.entries(groups)) {
        html += `<optgroup label="${group}">`;
        models.forEach(m => {
          html += `<option value="${m.id}" ${m.id === selectedId ? 'selected' : ''}>${m.name}</option>`;

      html += '</select>';

    // ===== STAGE RENDERING =====
    function renderStages() {
      const list = document.getElementById('stageList');
      list.innerHTML = stages.map((s, i) => `
    <div class="stage-item" draggable="true" data-index="${i}"
         ondragstart="dragStart(event)" ondragover="dragOver(event)"
         ondragenter="dragEnter(event)" ondragleave="dragLeave(event)"
         ondrop="drop(event)" ondragend="dragEnd(event)">
      <div class="stage-header">

        <span class="stage-name">${escapeHTML(s.name)}</span>

        <div class="stage-actions">
          ${i > 0 ? `<button title="上移" onclick="moveStage(${i},-1)">&#9650;</button>` : ''}
          ${i < stages.length - 1 ? `<button title="下移" onclick="moveStage(${i},1)">&#9660;</button>` : ''}
          ${!s.builtin ? `<button class="delete-btn" title="刪除" onclick="removeStage(${i})">&#10005;</button>` : ''}
        </div>
      </div>

    </div>

    function updateStageModel(stageId, model) {
      const s = stages.find(s => s.id === stageId);
      if (s) { s.model = model; saveStages(); }
    }

    function updateStagePrompt(stageId, prompt) {
      const s = stages.find(s => s.id === stageId);
      if (s) { s.prompt = prompt; saveStages(); }
    }

    function moveStage(index, dir) {
      const target = index + dir;
      if (target < 0 || target >= stages.length) return;
      [stages[index], stages[target]] = [stages[target], stages[index]];
      renderStages();
      saveStages();
    }

    function removeStage(index) {
      stages.splice(index, 1);
      renderStages();
      saveStages();
    }

    // ===== DRAG & DROP =====
    let dragIndex = null;
    function dragStart(e) {
      dragIndex = +e.currentTarget.dataset.index;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function dragEnter(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
    function drop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const targetIndex = +e.currentTarget.dataset.index;
      if (dragIndex !== null && dragIndex !== targetIndex) {
        const [moved] = stages.splice(dragIndex, 1);
        stages.splice(targetIndex, 0, moved);
        renderStages();
        saveStages();
      }
    }
    function dragEnd(e) { e.currentTarget.classList.remove('dragging'); dragIndex = null; }

    // ===== API CALL =====
    async function callAI(model, systemPrompt, userPrompt, onChunk) {
      const apiKey = document.getElementById('apiKey').value;
      const apiBase = document.getElementById('apiBase').value.replace(/\/$/, '');
      const temperature = parseFloat(document.getElementById('temperature').value);
      const maxTokens = parseInt(document.getElementById('maxTokens').value);

      if (!apiBase.startsWith('https://') && !apiBase.startsWith('http://localhost') && !apiBase.startsWith('http://127.0.0.1')) {
        throw new Error('API Base URL 必須使用 HTTPS（本地開發除外）');
      }

      abortController = new AbortController();

      const response = await fetch(`${apiBase}/chat/completions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model: model,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userPrompt }
          ],
          temperature: temperature,
          max_tokens: maxTokens,
          stream: true,
        }),
        signal: abortController.signal,
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API Error ${response.status}: ${errText}`);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let fullContent = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data:')) continue;
          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') continue;

          try {
            const json = JSON.parse(data);
            const content = json.choices?.[0]?.delta?.content;
            if (content) {
              fullContent += content;
              onChunk(content);
            }
          } catch (e) {
            // skip malformed chunks
          }
        }
      }

      if (buffer.trim()) {
        const trimmed = buffer.trim();
        if (trimmed.startsWith('data:')) {
          const data = trimmed.slice(5).trim();
          if (data !== '[DONE]') {
            try {
              const json = JSON.parse(data);
              const content = json.choices?.[0]?.delta?.content;
              if (content) {
                fullContent += content;
                if (onChunk) onChunk(content);
              }
            } catch (e) {}
          }
        }
      }

      return fullContent;
    }

    // ===== PARSE FILES FROM AI OUTPUT =====
    function sanitizeFilePath(rawPath) {
      let p = rawPath;
      if (p.includes('..') || p.startsWith('/')) return null;
      while (p.startsWith('./')) p = p.substring(2);
      if (p.includes('..') || p.startsWith('/') || p.length === 0) return null;
      return p;
    }

    function parseFiles(output) {
      const files = {};
      // Pattern: // ===== FILE: path ===== ... // ===== END FILE =====
      const regex = /\/\/\s*=+\s*FILE:\s*(.+?)\s*=+\s*\n([\s\S]*?)\/\/\s*=+\s*END\s*FILE\s*=+/g;
      let match;
      while ((match = regex.exec(output)) !== null) {
        const path = sanitizeFilePath(match[1].trim());
        if (!path) continue;
        const content = match[2].trim();
        files[path] = content;
      }

      // Fallback: try ```swift markers with filename comment
      if (Object.keys(files).length === 0) {
        const altRegex = /```(?:swift)?\s*\n?\s*\/\/\s*(?:File:\s*)?(.+\.swift)\s*\n([\s\S]*?)```/g;
        while ((match = altRegex.exec(output)) !== null) {
          const path = sanitizeFilePath(match[1].trim());
          if (!path) continue;
          const content = match[2].trim();
          files[path] = content;
        }
      }

      // Another fallback: try ### filename pattern
      if (Object.keys(files).length === 0) {
        const altRegex2 = /###?\s+`?([^\n`]+\.swift)`?\s*\n```(?:swift)?\s*\n([\s\S]*?)```/g;
        while ((match = altRegex2.exec(output)) !== null) {
          const path = sanitizeFilePath(match[1].trim());
          if (!path) continue;
          const content = match[2].trim();
          files[path] = content;
        }
      }

      return files;
    }

    function parseAppIconSpec(output) {
      const regex = /\/\/\s*=+\s*APP_ICON_SPEC\s*=+\s*\n([\s\S]*?)\/\/\s*=+\s*END\s*APP_ICON_SPEC\s*=+/;
      const match = regex.exec(output);
      if (!match) return null;
      try {
        return JSON.parse(match[1].trim());
      } catch (e) {
        console.warn('Failed to parse APP_ICON_SPEC:', e);
        return null;
      }
    }

    // ===== iOS VERSION COMPLIANCE SCAN =====
    // 掃描所有檔案，找出使用了高於 minIOS 的 API
    // 回傳 [{file, line, lineText, api, requiredIOS, replace}]
    function scanIOSVersionViolations(files, minIOS) {
      const target = parseFloat(minIOS);
      if (!isFinite(target)) return [];

      const violations = [];
      for (const [file, content] of Object.entries(files)) {
        if (!file.endsWith('.swift')) continue;
        const lines = content.split('\n');
        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];
          // 略過純註解行
          const trimmed = line.trim();
          if (trimmed.startsWith('//') || trimmed.startsWith('*')) continue;

          for (const rule of IOS_API_MIN_VERSION) {
            if (rule.minIOS <= target) continue;
            if (rule.pattern.test(line)) {
              // 提取命中的 API 名稱（取 regex 的第一個匹配字串）
              const m = line.match(rule.pattern);
              violations.push({
                file,
                line: i + 1,
                lineText: line.trim().slice(0, 140),
                api: m ? m[0] : rule.pattern.source,
                requiredIOS: rule.minIOS,
                replace: rule.replace || null,
              });
            }
          }
        }
      }
      return violations;
    }

    // 接收違規清單 → 組 targeted fix prompt → 呼叫 LLM → 覆寫 generatedFiles
    // 回傳 { fixedCount, affectedFiles, result }
    async function runIOSVersionFixPass(violations, minIOS, sanitizedName, model, onChunk) {
      const byFile = {};
      for (const v of violations) {
        (byFile[v.file] ||= []).push(v);
      }
      const affectedFiles = Object.keys(byFile);

      let violationList = '';
      for (const file of affectedFiles) {
        violationList += `\n${file}:\n`;
        for (const v of byFile[file]) {
          const suggestion = v.replace ? ` → replace with: ${v.replace}` : '';
          violationList += `  - line ${v.line}: \`${v.api}\` requires iOS ${v.requiredIOS}+${suggestion}\n    code: ${v.lineText}\n`;
        }
      }

      const systemPrompt = `You are a Swift code fixer specialized in iOS version compatibility. Your SOLE task: remove every use of iOS APIs newer than the deployment target, replacing them with equivalents available at the target version.

RULES:
- Do NOT use if #available / @available to work around — replace the API entirely.
- Preserve all existing functionality and UI behavior as closely as possible.
- Do NOT add new features, refactor unrelated code, or rename types.
- Output the COMPLETE corrected version of EVERY affected file, even if only one line changed.

OUTPUT FORMAT (strict):
// ===== FILE: path =====
(full file content)
// ===== END FILE =====

Output nothing else. No prose, no markdown, no explanations between files.`;

      let userPrompt = `MINIMUM iOS DEPLOYMENT TARGET: ${minIOS}

The following files contain APIs unavailable on iOS ${minIOS}. Fix EVERY violation listed.
${violationList}

--- AFFECTED FILES (output the complete corrected version of each) ---
`;
      for (const file of affectedFiles) {
        userPrompt += `\n// ===== FILE: ${file} =====\n${generatedFiles[file]}\n// ===== END FILE =====\n`;
      }

      const result = await callAI(model, systemPrompt, userPrompt, onChunk || (() => {}));
      const fixedFiles = parseFiles(result);
      let fixedCount = 0;
      for (const [path, content] of Object.entries(fixedFiles)) {
        let normalizedPath = path;
        if (normalizedPath.startsWith(sanitizedName + '/')) {
          normalizedPath = normalizedPath.substring(sanitizedName.length + 1);
        }
        generatedFiles[normalizedPath] = content;
        fixedCount++;
      }
      return { result, fixedCount, affectedFilesCount: affectedFiles.length };
    }

    async function generateAppIconImage(spec) {
      const size = 1024;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // 背景漸層
      const colors = spec.backgroundColors || ['#0071e3', '#6c5ce7'];
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, colors[0]);
      gradient.addColorStop(1, colors[1]);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      // Emoji
      const emoji = spec.emoji || '⚙️';
      const fgColor = spec.foregroundColor || 'rgba(0,0,0,0.2)';

      // 陰影
      ctx.shadowColor = fgColor;
      ctx.shadowBlur = 60;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 10;

      ctx.font = `${size * 0.5}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText(emoji, size / 2, size / 2);

      // 轉為 PNG blob
      return new Promise(resolve => {
        canvas.toBlob(blob => resolve(blob), 'image/png');
      });
    }

    function buildGroupTree(filePaths) {
      const root = { children: {}, files: [] };
      filePaths.forEach(fp => {
        const parts = fp.split('/');
        let node = root;
        for (let i = 0; i < parts.length - 1; i++) {
          if (!node.children[parts[i]]) node.children[parts[i]] = { children: {}, files: [] };
          node = node.children[parts[i]];
        }
        node.files.push(parts[parts.length - 1]);
      });
      return root;
    }

    function generatePbxproj(sanitizedName, bundleId, minIOS, swiftFiles, deviceFamily, dests) {

      const infoPlistRefUUID = uuid();
      const assetsRefUUID = uuid();

      const fileEntries = swiftFiles.map(f => ({
        path: f,
        name: f.split('/').pop(),
        refUUID: uuid(),
        buildUUID: uuid(),
      }));

      // Build PBXBuildFile
      let buildFileSection = '';
      fileEntries.forEach(f => {
        buildFileSection += `\t\t${f.buildUUID} /* ${f.name} in Sources */ = {isa = PBXBuildFile; fileRef = ${f.refUUID} /* ${f.name} */; };\n`;
      });
      buildFileSection += `\t\t${assetsBuildUUID} /* Assets.xcassets in Resources */ = {isa = PBXBuildFile; fileRef = ${assetsRefUUID} /* Assets.xcassets */; };\n`;

      // Build PBXFileReference

      fileRefSection += `\t\t${infoPlistRefUUID} /* Info.plist */ = {isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };\n`;
      fileRefSection += `\t\t${assetsRefUUID} /* Assets.xcassets */ = {isa = PBXFileReference; lastKnownFileType = folder.assetcatalog; path = Assets.xcassets; sourceTree = "<group>"; };\n`;

    async function createProjectZip(appName, bundleId, minIOS, files) {
      const zip = new JSZip();
      const sanitizedName = getModuleName();
      const root = zip.folder(sanitizedName);

      // .xcodeproj bundle (at same level as source folder inside root)
      const xcodeproj = root.folder(`${sanitizedName}.xcodeproj`);
      const swiftFiles = Object.keys(files).filter(f => f.endsWith('.swift'));
      const deviceFamily = getDeviceFamily();
      const dests = getSelectedDestinations();
      xcodeproj.file('project.pbxproj', generatePbxproj(sanitizedName, bundleId, minIOS, swiftFiles, deviceFamily, dests));

      // project.xcworkspace helps Xcode/Finder recognize the .xcodeproj bundle
      const workspace = xcodeproj.folder('project.xcworkspace');
      workspace.file('contents.xcworkspacedata', `<?xml version="1.0" encoding="UTF-8"?>
<Workspace version="1.0">
  <FileRef location="self:">
  </FileRef>
</Workspace>`);
      const wsSharedData = workspace.folder('xcshareddata');
      wsSharedData.file('WorkspaceSettings.xcsettings', `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
\t<key>PreviewsEnabled</key>
\t<false/>
</dict>
</plist>`);

      // xcshareddata for scheme
      const sharedData = xcodeproj.folder('xcshareddata').folder('xcschemes');
      sharedData.file(`${sanitizedName}.xcscheme`, generateXcscheme(sanitizedName));

      // Source folder (named same as module, sibling to .xcodeproj)
      const srcFolder = root.folder(sanitizedName);

      // Add generated files
      for (const [path, content] of Object.entries(files)) {
        const parts = path.split('/');
        let folder = srcFolder;
        for (let i = 0; i < parts.length - 1; i++) {
          folder = folder.folder(parts[i]);
        }
        folder.file(parts[parts.length - 1], content);
      }

      // Info.plist
      srcFolder.file('Info.plist', generateInfoPlist(appName, bundleId, minIOS));

      // Assets.xcassets
      const assets = srcFolder.folder('Assets.xcassets');
      assets.file('Contents.json', generateAssetContents());
      const accentColor = assets.folder('AccentColor.colorset');
      accentColor.file('Contents.json', generateAccentColorContents());
      const appIconFolder = assets.folder('AppIcon.appiconset');
      const hasIconImage = !!appIconSpec;
      appIconFolder.file('Contents.json', generateAppIconContents(hasIconImage));
      if (appIconSpec) {
        const iconBlob = await generateAppIconImage(appIconSpec);
        appIconFolder.file('AppIcon.png', iconBlob);
      }

      return await zip.generateAsync({ type: 'blob' });
    }

    // ===== GENERATION FLOW =====
    async function startGeneration(startIndex = 0) {
      const appName = document.getElementById('appName').value.trim();
      const bundleId = document.getElementById('bundleId').value.trim();
      const features = document.getElementById('appFeatures').value.trim();
      const minIOS = document.getElementById('minIOS').value;

      if (!appName) { alert('請輸入 App 名稱'); return; }
      if (!bundleId) { alert('請輸入 Bundle ID'); return; }
      if (!features) { alert('請輸入核心功能描述'); return; }

      const sanitizedName = getModuleName();
      if (!sanitizedName) { alert('請輸入有效的 Swift 模組名稱（英文）'); return; }

      const isRetry = startIndex > 0;

      isGenerating = true;
      if (!isRetry) {
        generatedFiles = {};
        appIconSpec = null;
      }
      document.getElementById('generateBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = '';
      document.getElementById('progressSection').classList.add('active');
      document.getElementById('filePreviewSection').classList.add('active');
      document.getElementById('downloadSection').classList.remove('active');
      const outputArea = document.getElementById('outputArea');

      if (!isRetry) {
        outputArea.textContent = '';
        // Render progress items
        const progressList = document.getElementById('progressList');
        progressList.innerHTML = stages.map((s, i) => `
    <div class="stage-progress" id="progress-${i}">
      <div class="status-icon" id="status-icon-${i}">&#9203;</div>
      <div class="stage-label">${escapeHTML(s.name)}</div>
      <div class="stage-time" id="stage-time-${i}"></div>
    </div>
  `).join('');
      } else {
        // 重試：重置從 startIndex 開始的階段顯示狀態，並移除舊的重試按鈕
        for (let i = startIndex; i < stages.length; i++) {
          const iconEl = document.getElementById(`status-icon-${i}`);
          const timeEl = document.getElementById(`stage-time-${i}`);
          if (iconEl) iconEl.innerHTML = '&#9203;';
          if (timeEl) timeEl.textContent = '';
          const row = document.getElementById(`progress-${i}`);
          if (row) {
            const oldBtn = row.querySelector('.retry-btn');
            if (oldBtn) oldBtn.remove();
          }
        }
        const retryMarker = document.createElement('span');
        retryMarker.className = 'stage-marker';
        retryMarker.textContent = `\n\n════ 從第 ${startIndex + 1} 階段「${stages[startIndex].name}」重試 ════\n`;
        outputArea.appendChild(retryMarker);
      }

      let scrollPending = false;

      for (let i = startIndex; i < stages.length; i++) {
        if (!isGenerating) break;
        const stage = stages[i];

        // Update progress
        document.getElementById(`status-icon-${i}`).innerHTML = '<div class="spinner"></div>';
        const startTime = Date.now();

        const stageMarker = document.createElement('span');
        stageMarker.className = 'stage-marker';
        stageMarker.textContent = `\n━━━ ${stage.name} (${stage.model}) ━━━\n`;
        outputArea.appendChild(stageMarker);
        const currentStreamSpan = document.createElement('span');
        outputArea.appendChild(currentStreamSpan);
        if (!scrollPending) {
          scrollPending = true;
          requestAnimationFrame(() => {
            outputArea.scrollTop = outputArea.scrollHeight;
            scrollPending = false;
          });
        }

        const fileOutputInstruction = `

CRITICAL OUTPUT FORMAT: You MUST output each file using this EXACT format - no other format will be accepted:

// ===== FILE: filename.swift =====
(file content here)
// ===== END FILE =====

For files in subdirectories use paths like: Models/User.swift, Views/HomeView.swift, ViewModels/HomeViewModel.swift
Do NOT nest under any project name folder - just use relative paths from the source root.
Every file MUST have both the FILE and END FILE markers or it will be lost.`;

        const iosVersionGuide = getIOSVersionGuide(minIOS, sanitizedName);
        const dests = getSelectedDestinations();
        const iphoneOris = getSelectedOrientations('iphoneOrientations');
        const ipadOris = getSelectedOrientations('ipadOrientations');
        const oriMap = {
          'UIInterfaceOrientationPortrait': 'Portrait',
          'UIInterfaceOrientationLandscapeLeft': 'Landscape Left',
          'UIInterfaceOrientationLandscapeRight': 'Landscape Right',
          'UIInterfaceOrientationPortraitUpsideDown': 'Upside Down'
        };

        const appContext = `
APP NAME: ${appName}
SWIFT MODULE NAME: ${sanitizedName}
BUNDLE ID: ${bundleId}
MINIMUM iOS DEPLOYMENT TARGET: ${minIOS}
SUPPORTED DESTINATIONS: ${dests.map(d => d === 'iphone' ? 'iPhone' : d === 'ipad' ? 'iPad' : d === 'mac-catalyst' ? 'Mac (Catalyst)' : 'Apple Vision').join(', ')}
IPHONE ORIENTATIONS: ${iphoneOris.map(o => oriMap[o] || o).join(', ')}
IPAD ORIENTATIONS: ${ipadOris.map(o => oriMap[o] || o).join(', ')}
CORE FEATURES: ${features}`;

        // iosVersionGuide 與階段無關，只跟 minIOS 有關 → 放 system prompt 可享 prompt cache 且注意力更集中
        let systemPrompt = stage.prompt + fileOutputInstruction + '\n\n' + iosVersionGuide;
        let userPrompt = appContext;

        if (i > 0) {
          userPrompt += `\n\n--- FILES GENERATED SO FAR ---\n`;
          for (const [path, content] of Object.entries(generatedFiles)) {
            userPrompt += `\n// ===== FILE: ${path} =====\n${content}\n// ===== END FILE =====\n`;
          }
          userPrompt += `\n--- END OF EXISTING FILES ---\n\nNow proceed with: ${stage.name}\nBuild upon the existing files above. You may modify existing files or add new ones.`;
        }

        try {
          const result = await callAI(stage.model, systemPrompt, userPrompt, (chunk) => {
            currentStreamSpan.textContent += chunk;
            if (!scrollPending) {
              scrollPending = true;
              requestAnimationFrame(() => {
                outputArea.scrollTop = outputArea.scrollHeight;
                scrollPending = false;
              });
            }
          });

          // Parse files from this stage
          const stageFiles = parseFiles(result);
          const fileCount = Object.keys(stageFiles).length;

          // Normalize paths - remove leading project name folder if present
          for (const [path, content] of Object.entries(stageFiles)) {
            let normalizedPath = path;
            if (normalizedPath.startsWith(sanitizedName + '/')) {
              normalizedPath = normalizedPath.substring(sanitizedName.length + 1);
            }
            generatedFiles[normalizedPath] = content;
          }

          // 嘗試解析 App Icon 規格
          const iconSpec = parseAppIconSpec(result);
          if (iconSpec) appIconSpec = iconSpec;

          const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
          document.getElementById(`status-icon-${i}`).textContent = '\u2705';
          document.getElementById(`stage-time-${i}`).textContent = `${elapsed}s | ${fileCount} 個檔案`;

          const fileMarker = document.createElement('span');
          fileMarker.className = 'file-marker';
          fileMarker.textContent = `\n✓ 階段完成 - 產生 ${fileCount} 個檔案\n`;
          outputArea.appendChild(fileMarker);

          renderFileTree();

        } catch (err) {
          if (err.name === 'AbortError') {
            document.getElementById(`status-icon-${i}`).textContent = '\u23F8\uFE0F';
            const abortMarker = document.createElement('span');
            abortMarker.className = 'error-text';
            abortMarker.textContent = '\n⚠ 使用者中止產生\n';
            outputArea.appendChild(abortMarker);
            break;
          }
          document.getElementById(`status-icon-${i}`).textContent = '\u274C';
          const errMarker = document.createElement('span');
          errMarker.className = 'error-text';
          errMarker.textContent = `\n✗ 錯誤: ${err.message}\n`;
          outputArea.appendChild(errMarker);
          const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
          document.getElementById(`stage-time-${i}`).textContent = `${elapsed}s | 失敗`;
          const failedRow = document.getElementById(`progress-${i}`);
          if (failedRow && !failedRow.querySelector('.retry-btn')) {
            const retryBtn = document.createElement('button');
            retryBtn.type = 'button';
            retryBtn.className = 'btn btn-secondary btn-sm retry-btn';
            retryBtn.textContent = '↻ 重試此階段';
            retryBtn.onclick = () => startGeneration(i);
            failedRow.appendChild(retryBtn);
          }
          console.error(err);
          break;
        }
      }

      // iOS 版本相容性自動修復：deterministic 掃描 + targeted fix pass，最多迭代 3 次
      if (isGenerating && Object.keys(generatedFiles).length > 0) {
        const progressList = document.getElementById('progressList');
        const MAX_FIX_PASSES = 3;
        // 用最後一個階段的模型（通常是最強的）來跑修復
        const fixModel = stages[stages.length - 1]?.model || 'claude-sonnet-4-5-20250929';

        for (let pass = 1; pass <= MAX_FIX_PASSES && isGenerating; pass++) {
          const violations = scanIOSVersionViolations(generatedFiles, minIOS);
          if (violations.length === 0) {
            if (pass === 1) {
              const okMarker = document.createElement('span');
              okMarker.className = 'file-marker';
              okMarker.textContent = `\n✓ iOS ${minIOS} 相容性檢查通過，無違規 API\n`;
              outputArea.appendChild(okMarker);
            }
            break;
          }

          const passId = `fix-pass-${pass}`;
          const passRow = document.createElement('div');
          passRow.className = 'stage-progress';
          passRow.id = `progress-${passId}`;
          passRow.innerHTML = `
            <div class="status-icon" id="status-icon-${passId}"><div class="spinner"></div></div>
            <div class="stage-label">iOS ${minIOS} 相容性修復 #${pass}（${violations.length} 處違規）</div>
            <div class="stage-time" id="stage-time-${passId}"></div>
          `;
          progressList.appendChild(passRow);

          const fixMarker = document.createElement('span');
          fixMarker.className = 'stage-marker';
          fixMarker.textContent = `\n━━━ iOS 相容性修復 Pass #${pass} (${fixModel}) ━━━\n`;
          outputArea.appendChild(fixMarker);

          // 顯示違規摘要到輸出區
          const violationSummary = document.createElement('span');
          violationSummary.className = 'error-text';
          const summaryLines = violations.slice(0, 10).map(v =>
            `  ${v.file}:${v.line}  ${v.api} (需 iOS ${v.requiredIOS}+)`
          );
          if (violations.length > 10) summaryLines.push(`  ... 還有 ${violations.length - 10} 處`);
          violationSummary.textContent = `發現違規:\n${summaryLines.join('\n')}\n\n`;
          outputArea.appendChild(violationSummary);

          const fixStreamSpan = document.createElement('span');
          outputArea.appendChild(fixStreamSpan);

          const fixStart = Date.now();
          try {
            const result = await runIOSVersionFixPass(
              violations, minIOS, sanitizedName, fixModel,
              (chunk) => {
                fixStreamSpan.textContent += chunk;
                if (!scrollPending) {
                  scrollPending = true;
                  requestAnimationFrame(() => {
                    outputArea.scrollTop = outputArea.scrollHeight;
                    scrollPending = false;
                  });
                }
              }
            );
            const fixElapsed = ((Date.now() - fixStart) / 1000).toFixed(1);
            document.getElementById(`status-icon-${passId}`).textContent = '✅';
            document.getElementById(`stage-time-${passId}`).textContent =
              `${fixElapsed}s | 修復 ${result.fixedCount}/${result.affectedFilesCount} 個檔案`;
            renderFileTree();
          } catch (err) {
            if (err.name === 'AbortError') {
              document.getElementById(`status-icon-${passId}`).textContent = '⏸️';
              break;
            }
            document.getElementById(`status-icon-${passId}`).textContent = '❌';
            const fixElapsed = ((Date.now() - fixStart) / 1000).toFixed(1);
            document.getElementById(`stage-time-${passId}`).textContent = `${fixElapsed}s | 失敗`;
            const errMarker = document.createElement('span');
            errMarker.className = 'error-text';
            errMarker.textContent = `\n✗ 修復失敗: ${err.message}\n`;
            outputArea.appendChild(errMarker);
            console.error('iOS fix pass failed:', err);
            break;
          }
        }

        // 最後再掃一次，若仍有殘留違規則警告使用者
        const remaining = scanIOSVersionViolations(generatedFiles, minIOS);
        if (remaining.length > 0) {
          const warnMarker = document.createElement('span');
          warnMarker.className = 'error-text';
          const sample = remaining.slice(0, 5).map(v => `  ${v.file}:${v.line} ${v.api}`).join('\n');
          warnMarker.textContent = `\n⚠ 經過 ${MAX_FIX_PASSES} 次修復仍有 ${remaining.length} 處違規:\n${sample}\n建議手動檢查或提高 minIOS 版本。\n`;
          outputArea.appendChild(warnMarker);
        }
      }

      // Ensure the app has a main entry point
      ensureEntryPoint(sanitizedName);
      renderFileTree();

      isGenerating = false;
      document.getElementById('generateBtn').style.display = '';
      document.getElementById('stopBtn').style.display = 'none';

      if (Object.keys(generatedFiles).length > 0) {
        const total = Object.keys(generatedFiles).length;
        document.getElementById('fileCount').textContent = `共 ${total} 個檔案，已準備好打包下載`;
        document.getElementById('downloadSection').classList.add('active');
      }
    }

    function ensureEntryPoint(sanitizedName) {
      const minIOS = document.getElementById('minIOS').value;
      const v = parseFloat(minIOS);

      if (v < 13) {
        // UIKit: need AppDelegate
        const hasAppDelegate = Object.keys(generatedFiles).some(f =>
          f.includes('AppDelegate') && generatedFiles[f].includes('UIApplicationDelegate')
        );
        if (!hasAppDelegate) {
          generatedFiles['AppDelegate.swift'] = `import UIKit

@UIApplicationMain
class AppDelegate: UIResponder, UIApplicationDelegate {
    var window: UIWindow?

    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
        window = UIWindow(frame: UIScreen.main.bounds)
        let vc = ViewController()
        window?.rootViewController = UINavigationController(rootViewController: vc)
        window?.makeKeyAndVisible()
        return true
    }
}`;
          if (!Object.keys(generatedFiles).some(f => f.includes('ViewController.swift'))) {
            generatedFiles['ViewController.swift'] = `import UIKit

class ViewController: UIViewController {
    override func viewDidLoad() {
        super.viewDidLoad()
        title = "${sanitizedName}"
        view.backgroundColor = .systemBackground
        let label = UILabel()
        label.text = "Welcome to ${sanitizedName}"
        label.textAlignment = .center
        label.translatesAutoresizingMaskIntoConstraints = false
        view.addSubview(label)
        NSLayoutConstraint.activate([
            label.centerXAnchor.constraint(equalTo: view.centerXAnchor),
            label.centerYAnchor.constraint(equalTo: view.centerYAnchor)
        ])
    }
}`;
          }
        }
      } else if (v < 14) {
        // iOS 13: SwiftUI via SceneDelegate
        const hasSceneDelegate = Object.keys(generatedFiles).some(f =>
          f.includes('SceneDelegate') || (f.includes('AppDelegate') && generatedFiles[f].includes('UIApplicationDelegate'))
        );
        if (!hasSceneDelegate) {
          generatedFiles['AppDelegate.swift'] = `import UIKit

@UIApplicationMain
class AppDelegate: UIResponder, UIApplicationDelegate {
    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
        return true
    }

    func application(_ application: UIApplication, configurationForConnecting connectingSceneSession: UISceneSession, options: UIScene.ConnectionOptions) -> UISceneConfiguration {
        return UISceneConfiguration(name: "Default Configuration", sessionRole: connectingSceneSession.role)
    }
}`;
          generatedFiles['SceneDelegate.swift'] = `import UIKit
import SwiftUI

class SceneDelegate: UIResponder, UIWindowSceneDelegate {
    var window: UIWindow?

    func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions) {
        guard let windowScene = scene as? UIWindowScene else { return }
        let window = UIWindow(windowScene: windowScene)
        window.rootViewController = UIHostingController(rootView: ContentView())
        self.window = window
        window.makeKeyAndVisible()
    }
}`;
        }
        if (!Object.keys(generatedFiles).some(f => f.endsWith('ContentView.swift'))) {
          generatedFiles['ContentView.swift'] = `import SwiftUI

struct ContentView: View {
    var body: some View {
        NavigationView {
            Text("Welcome to ${sanitizedName}")
                .navigationBarTitle("${sanitizedName}")
        }
    }
}

struct ContentView_Previews: PreviewProvider {
    static var previews: some View {
        ContentView()
    }
}`;
        }
      } else {
        // iOS 14+: @main App protocol
        const hasEntryPoint = Object.keys(generatedFiles).some(f =>
          f.endsWith('App.swift') && generatedFiles[f].includes('@main')
        );
        if (!hasEntryPoint) {
          generatedFiles[`${sanitizedName}App.swift`] = `import SwiftUI

@main
struct ${sanitizedName}App: App {
    var body: some Scene {
        WindowGroup {
            ContentView()
        }
    }
}`;
        }
        if (!Object.keys(generatedFiles).some(f => f.endsWith('ContentView.swift'))) {
          const navView = v >= 16 ? 'NavigationStack' : 'NavigationView';
          const navTitle = v >= 14 ? `.navigationTitle("${sanitizedName}")` : `.navigationBarTitle("${sanitizedName}")`;
          const preview = v >= 17
            ? `\n#Preview {\n    ContentView()\n}`
            : `\nstruct ContentView_Previews: PreviewProvider {\n    static var previews: some View {\n        ContentView()\n    }\n}`;
          generatedFiles['ContentView.swift'] = `import SwiftUI

struct ContentView: View {
    var body: some View {
        ${navView} {
            Text("Welcome to ${sanitizedName}")
                ${navTitle}
        }
    }
}
${preview}`;
        }
      }
    }

    function stopGeneration() {
      isGenerating = false;
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
    }

    async function downloadProject() {
      const appName = document.getElementById('appName').value.trim();
      const bundleId = document.getElementById('bundleId').value.trim();
      const minIOS = document.getElementById('minIOS').value;
      const sanitizedName = getModuleName();

      try {
        const blob = await createProjectZip(appName, bundleId, minIOS, generatedFiles);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${sanitizedName}.zip`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        alert('打包失敗: ' + err.message);
        console.error(err);
      }
    }

    // ===== INIT =====
    init();
  </script>
</body>

</html>
